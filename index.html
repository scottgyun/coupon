<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Coupon To Site</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #ui-layer {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; pointer-events: none;
        }
        .guide-text {
            color: white; background: rgba(0,0,0,0.7);
            padding: 12px 24px; border-radius: 30px;
            font-family: sans-serif; font-size: 16px; font-weight: bold;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="guide" class="guide-text">이미지를 비춰주세요!</div>
        <div id="click-me" class="guide-text hidden">🎁 쿠폰을 터치해서 사이트 방문하기 🎁</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="couponImg" src="./coupon.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="couponEntity" src="#couponImg" position="0 0 0" height="0.6" width="1" class="clickable"></a-image>
        </a-entity>
    </a-scene>

    <script>
        const guide = document.querySelector('#guide');
        const clickMe = document.querySelector('#click-me');
        const couponEntity = document.querySelector('#couponEntity');
        const sceneEl = document.querySelector('a-scene');

        // 이동할 구글 사이트 주소
        const TARGET_URL = "https://sites.google.com/view/tchinmokho"; 

        sceneEl.addEventListener("targetFound", () => {
            guide.classList.add("hidden");
            clickMe.classList.remove("hidden");
        });

        sceneEl.addEventListener("targetLost", () => {
            guide.classList.remove("hidden");
            clickMe.classList.add("hidden");
        });

        // 쿠폰 클릭 시 사이트 이동
        couponEntity.addEventListener("click", () => {
            // 새 창에서 구글 사이트 열기
            window.open(TARGET_URL, '_blank');
        });
    </script>
</body>
</html>
