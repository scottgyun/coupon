<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Coupon Event</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        
        /* 안내 문구 레이아웃 */
        #ui-layer {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; pointer-events: none; /* 클릭 방해 금지 */
        }
        .guide-text {
            color: white; background: rgba(0,0,0,0.6);
            padding: 10px 20px; border-radius: 20px;
            font-family: sans-serif; font-size: 14px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="guide" class="guide-text">이미지를 비춰주세요</div>
        <div id="click-me" class="guide-text hidden">쿠폰을 터치하세요!</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="couponImg" src="./coupon.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-image id="couponEntity" src="#couponImg" position="0 0 0" height="0.6" width="1" class="clickable"></a-image>
        </a-entity>
    </a-scene>

   <script>
    const guide = document.querySelector('#guide');
    const clickMe = document.querySelector('#click-me');
    const couponEntity = document.querySelector('#couponEntity');
    const sceneEl = document.querySelector('a-scene');

    // 쿠폰 번호 설정
    const COUPON_NUMBER = "GIFT-2026-AR-SUCCESS"; 

    sceneEl.addEventListener("targetFound", () => {
        guide.classList.add("hidden");
        clickMe.classList.remove("hidden");
    });

    sceneEl.addEventListener("targetLost", () => {
        guide.classList.remove("hidden");
        clickMe.classList.add("hidden");
    });

    // 쿠폰 클릭 이벤트 수정
    couponEntity.addEventListener("click", () => {
        // 1단계: 먼저 클립보드 복사 시도
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(COUPON_NUMBER)
                .then(() => {
                    alert("쿠폰번호가 복사되었습니다!\n번호: " + COUPON_NUMBER);
                })
                .catch(() => {
                    // 복사 실패 시 2단계로 이동
                    showPrompt(COUPON_NUMBER);
                });
        } else {
            // 보안 환경이 아니거나 기능을 지원하지 않을 때 2단계 실행
            showPrompt(COUPON_NUMBER);
        }
    });

    // 2단계: 복사가 안 될 때 번호를 보여주고 수동 복사 유도
    function showPrompt(text) {
        window.prompt("쿠폰번호를 복사(Ctrl+C 또는 길게 누르기)하세요:", text);
    }
</script>
</body>
</html>
