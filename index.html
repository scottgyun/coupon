<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>50-Coupon AR System</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; width: 100vw; height: 100vh; position: fixed; }
        #ar-scene-container { width: 100%; height: 100%; }
        #ui {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            color: white; background: rgba(0,0,0,0.7);
            padding: 12px 24px; border-radius: 30px; text-align: center;
            font-family: sans-serif; z-index: 1000; pointer-events: none;
            font-size: 16px; font-weight: bold; width: 80%; max-width: 300px;
        }
        .found { background: rgba(0, 123, 255, 0.9) !important; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: translateX(-50%) scale(1); } to { transform: translateX(-50%) scale(1.05); } }
    </style>
</head>
<body>

    <div id="ui">쿠폰을 찾아 카메라로 비춰보세요</div>

    <div id="ar-scene-container">
        <a-scene 
            id="main-scene"
            mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
            embedded vr-mode-ui="enabled: false" loading-screen="enabled: false"
            device-orientation-permission-ui="enabled: false"
            color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights">
            
            <a-assets>
                <img id="couponImg" src="./coupon.png">
            </a-assets>

            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

            </a-scene>
    </div>

    <script>
        const sceneEl = document.querySelector('#main-scene');
        const ui = document.querySelector('#ui');
        const TARGET_URL = "https://sites.google.com/view/tchinmokho"; // 이동할 구글 사이트 주소

        // 1. 50개의 타겟 엔티티 자동 생성 (Index 0 ~ 49)
        for (let i = 0; i < 50; i++) {
            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            // 쿠폰 발견 시 공중에 띄울 이미지
            const image = document.createElement('a-image');
            image.setAttribute('src', '#couponImg');
            image.setAttribute('position', '0 0 0.1'); // 마커 바로 앞 10cm 지점
            image.setAttribute('height', '0.6');
            image.setAttribute('width', '0.9');
            
            entity.appendChild(image);
            
            // 타겟 인식 이벤트
            entity.addEventListener("targetFound", () => {
                const couponNum = i + 1; // 1번부터 시작
                ui.innerText = `🎉 ${couponNum}번 쿠폰 발견! 🎉`;
                ui.classList.add("found");
                
                // 1.5초간 쿠폰을 보여준 뒤, 번호 파라미터를 들고 이동
            setTimeout(() => {
// 주소 끝에 /가 있든 없든 안전하게 결합합니다.
    const cleanUrl = TARGET_URL.endsWith('/') ? TARGET_URL.slice(0, -1) : TARGET_URL;
    const finalUrl = cleanUrl + "/#num=" + couponNum; // /#num= 형식을 사용
    
    console.log("최종 이동 주소:", finalUrl);
    window.top.location.href = finalUrl; // window.top을 써서 전체 페이지를 이동
}, 1500);
});

            sceneEl.appendChild(entity);
        }
    </script>
</body>
</html>
