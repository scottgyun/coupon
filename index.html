<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Direct Click</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        #ui-layer {
            position: fixed; top: 20px; left: 0; right: 0;
            display: flex; justify-content: center; z-index: 100;
            pointer-events: none;
        }
        .guide-text {
            color: white; background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px; border-radius: 20px;
            font-family: sans-serif; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="status-text" class="guide-text">카메라로 대상을 비춰주세요</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no;" 
        embedded
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="couponImg" src="./coupon.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="objects: .clickable"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-image 
                id="coupon-entity" 
                src="#couponImg" 
                class="clickable"
                position="0 0 0" 
                height="0.7" 
                width="1">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        const statusText = document.querySelector('#status-text');
        const couponEntity = document.querySelector('#coupon-entity');
        const target = document.querySelector('#target');

        const TARGET_URL = "https://sites.google.com/view/tchinmokho"; 

        // 타겟 발견 시 문구 변경
        target.addEventListener("targetFound", () => {
            statusText.innerText = "쿠폰이 나타났습니다! 쿠폰을 터치하세요.";
        });

        target.addEventListener("targetLost", () => {
            statusText.innerText = "카메라로 대상을 비춰주세요";
        });

        // [핵심] 투명 레이어가 아니라, AR 이미지 객체에 직접 이벤트를 겁니다.
        couponEntity.addEventListener("click", (evt) => {
            console.log("쿠폰 클릭됨!");
            // 모바일 팝업 차단을 방지하기 위해 현재 창에서 이동
            window.location.href = TARGET_URL;
        });
    </script>
</body>
</html>
