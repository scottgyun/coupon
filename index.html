<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Indoor AR Hidden Coupon</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.8);
            padding: 20px; border-radius: 15px; text-align: center;
            font-family: sans-serif; z-index: 100; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        탐색 중...<br>
        숨겨진 대상을 카메라로 비춰보세요!
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
        embedded vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="hidden-target" mindar-image-target="targetIndex: 0"></a-entity>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#hidden-target');
        const ui = document.querySelector('#ui');
        const TARGET_URL = "https://sites.google.com/view/tchinmokho";

        // [핵심] 대상을 인식하는 순간 바로 실행
        targetEl.addEventListener("targetFound", () => {
            ui.innerHTML = "🎉 쿠폰 발견! 이동합니다... 🎉";
            ui.style.background = "rgba(0, 150, 0, 0.9)";
            
            // 0.5초 뒤에 자동으로 사이트 이동
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 500);
        });
    </script>
</body>
</html>
